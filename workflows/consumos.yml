name: Consumos Mensuales DAZ

on:
  schedule:
    - cron: '0 11 1 * *'   # día 1 de cada mes a las 8am Argentina (UTC-3)
  workflow_dispatch:

jobs:
  consumos:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        env:
          CUBIERTAS_USUARIO:  ${{ secrets.CUBIERTAS_USUARIO }}
          CUBIERTAS_PASSWORD: ${{ secrets.CUBIERTAS_PASSWORD }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_DEST:         ${{ secrets.GMAIL_DEST }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python consumos_mensuales.py
